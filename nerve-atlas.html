<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lower Limb Nerve Atlas</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #080810;
  color: #e0e0e0;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 270px;
  min-width: 270px;
  background: #0e0e1a;
  border-right: 1px solid #1e1e30;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid #1e1e30;
}
#sidebar-header h1 {
  font-size: 13px;
  font-weight: 700;
  color: #ffd700;
  letter-spacing: 0.4px;
}
#sidebar-header p {
  font-size: 11px;
  color: #555;
  margin-top: 3px;
}
#nerve-tree {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #333 transparent;
}
#nerve-tree::-webkit-scrollbar { width: 4px; }
#nerve-tree::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.plexus-group { margin-bottom: 2px; }
.plexus-label {
  padding: 8px 16px 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: #444;
}
.nerve-item {
  padding: 4px 14px 4px calc(14px + var(--depth, 0) * 10px);
  font-size: 11.5px;
  color: #888;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: color 0.12s, background 0.12s, border-color 0.12s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.7;
}
.nerve-item:hover { color: #ffd700; background: rgba(255,215,0,0.04); }
.nerve-item.selected {
  color: #ffd700;
  border-left-color: #ffd700;
  background: rgba(255,215,0,0.09);
  font-weight: 600;
}
.nerve-item.highlighted {
  color: #e8a000;
  border-left-color: rgba(255,160,0,0.4);
  background: rgba(255,160,0,0.04);
}

/* ── CANVAS AREA ── */
#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#canvas { width: 100%; height: 100%; display: block; }

/* ── DROP / LOAD OVERLAY ── */
#drop-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: #080810;
  z-index: 20;
}
#drop-overlay h2 { font-size: 22px; color: #ffd700; margin-bottom: 8px; font-weight: 700; }
#drop-overlay p { color: #555; font-size: 13px; margin-bottom: 28px; }
#file-btn {
  background: #ffd700;
  color: #000;
  border: none;
  padding: 11px 28px;
  border-radius: 7px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
}
#file-btn:hover { background: #ffe033; }
#file-input { display: none; }
#status-msg {
  margin-top: 14px;
  font-size: 12px;
  color: #888;
  min-height: 18px;
}

/* ── LOADING BAR ── */
#loading-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, #ffd700, #ff8800, #ffd700);
  background-size: 200%;
  display: none;
  animation: shimmer 1.2s linear infinite;
  z-index: 25;
}
@keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* ── INFO PANEL ── */
#info-panel {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 272px;
  background: rgba(8, 8, 18, 0.94);
  border: 1px solid #2a2a40;
  border-radius: 10px;
  padding: 15px;
  display: none;
  backdrop-filter: blur(10px);
  z-index: 10;
}
#info-panel h3 { font-size: 13.5px; color: #ffd700; margin-bottom: 10px; font-weight: 700; line-height: 1.3; }
.info-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 11.5px; }
.info-label { color: #555; min-width: 72px; flex-shrink: 0; }
.info-value { color: #ccc; }
#path-display {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #1e1e30;
  font-size: 10.5px;
  color: #666;
  line-height: 1.7;
  word-break: break-word;
}
#path-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }

/* ── CONTROLS HINT ── */
#controls-hint {
  position: absolute;
  top: 14px;
  right: 16px;
  font-size: 10.5px;
  color: #333;
  text-align: right;
  line-height: 1.9;
  pointer-events: none;
}

/* ── LEGEND ── */
#legend {
  position: absolute;
  top: 14px;
  left: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}
.legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #555; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── RESET BTN ── */
#reset-btn {
  position: absolute;
  bottom: 20px;
  left: 16px;
  background: rgba(30,30,50,0.9);
  border: 1px solid #333;
  color: #888;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  display: none;
  transition: color 0.15s, border-color 0.15s;
}
#reset-btn:hover { color: #ffd700; border-color: #ffd700; }
</style>

// Three.js transforms node names when loading GLTF:
//   spaces → underscores, periods → removed
// e.g. "Femoral nerve.r" → "Femoral_nerveR" (lowercase r)
// We must apply the same transform when building our lookup.
function toThreeName(s) {
  return s.replace(/ /g, '_').replace(/\./g, '');
}

// Reverse lookup: Three.js mesh name → nerve display name
const MESH_TO_NERVE = {};
for (const [name, data] of Object.entries(NERVE_GRAPH)) {
  if (data.meshName) MESH_TO_NERVE[toThreeName(data.meshName)] = name;
}

// Collect all descendants (inclusive of root)
function getDescendants(root) {
  const result = new Set();
  const q = [root];
  while (q.length) {
    const n = q.shift();
    if (!NERVE_GRAPH[n]) continue;
    result.add(n);
    for (const c of NERVE_GRAPH[n].children) q.push(c);
  }
  return result;
}

// Ancestors path from top-level to nerve
function getPath(nerveName) {
  const parent = {};
  for (const [name, data] of Object.entries(NERVE_GRAPH)) {
    for (const child of data.children) parent[child] = name;
  }
  const path = [nerveName];
  let cur = nerveName;
  while (parent[cur]) { cur = parent[cur]; path.unshift(cur); }
  return path;
}

  "Cutaneous Branch (Obturator)","Posterior Branch (Obturator)",
  "Ilioinguinal Nerve","Iliohypogastric Nerve","Lateral Cutaneous Branch (Iliohypogastric)",
  "Genitofemoral Nerve","Femoral Branch (Genitofemoral)","Genital Branch (Genitofemoral)",
  "Lateral Femoral Cutaneous Nerve"
];
const SACRAL_ORDER = [
  "Sciatic Nerve","Tibial Nerve","Medial Calcaneal Branches",
  "Medial Plantar Nerve","Common Plantar Digital Nerves","Proper Plantar Digital Branches (Medial)",
  "Lateral Plantar Nerve","Superficial Branch (Lateral Plantar)","Deep Branch (Lateral Plantar)",
  "Proper Plantar Digital Branches (Lateral)","Medial Sural Cutaneous Nerve",
  "Common Fibular Nerve","Deep Fibular Nerve","Medial Branch (Deep Fibular)",
  "Lateral Branch (Deep Fibular)","Dorsal Digital Branches (Deep Fibular)",
  "Superficial Fibular Nerve","Medial Dorsal Cutaneous Nerve","Lateral Dorsal Cutaneous Nerve",
  "Dorsal Digital Branches (Superficial Fibular)","Lateral Sural Cutaneous Nerve",
  "Superior Gluteal Nerve","Inferior Gluteal Nerve",
  "Posterior Cutaneous Nerve of Thigh","Inferior Clunial Branches",
  "Sural Nerve","Lateral Dorsal Cutaneous (Sural)","Lateral Plantar Cutaneous (Sural)",
  "Lateral Calcaneal Nerves","Superior Clunial Nerve"
];

// ═══════════════════════════════════════════════════════════════════
// BUILD SIDEBAR
// ═══════════════════════════════════════════════════════════════════
function buildSidebar() {
  const container = document.getElementById('tree-content');

  function addGroup(title, nerves) {
    const group = document.createElement('div');
    group.className = 'plexus-group';
    const label = document.createElement('div');
    label.className = 'plexus-label';
    label.textContent = title;
    group.appendChild(label);

    for (const name of nerves) {
      const data = NERVE_GRAPH[name];
      if (!data) continue;
      const item = document.createElement('div');
      item.className = 'nerve-item';
      item.style.setProperty('--depth', data.depth || 0);
      item.id = itemId(name);
      const prefix = data.depth > 0 ? '╴'.repeat(data.depth) + ' ' : '';
      item.textContent = prefix + name;
      item.title = data.territory;
      item.addEventListener('click', () => selectNerve(name));
      group.appendChild(item);
    }
    container.appendChild(group);
  }

  addGroup('LUMBAR PLEXUS  L1–L4', LUMBAR_ORDER);
  addGroup('SACRAL PLEXUS  L4–S3', SACRAL_ORDER);
}

function itemId(name) {
  return 'ni-' + name.replace(/[^a-z0-9]/gi, '_');
}

// ═══════════════════════════════════════════════════════════════════
// THREE.JS
// ═══════════════════════════════════════════════════════════════════
const canvas  = document.getElementById('canvas');
const ctnr    = document.getElementById('canvas-container');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(ctnr.clientWidth, ctnr.clientHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = false;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x080810);

const camera = new THREE.PerspectiveCamera(45, ctnr.clientWidth / ctnr.clientHeight, 0.001, 200);
camera.position.set(0, 0.4, 1.5);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 0.05;
controls.maxDistance = 10;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(1, 3, 2);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8899cc, 0.3);
fill.position.set(-2, -1, -2);
scene.add(fill);

// Material factories — depthTest:false so nerves always render
// through surrounding geometry regardless of depth.
function matNerveDefault() {
  return new THREE.MeshBasicMaterial({
    color: 0x998800, transparent: true, opacity: 0.35,
    depthTest: false, depthWrite: false, side: THREE.DoubleSide
  });
}
function matNerveDimmed() {
  // Non-selected nerves when something else is selected — nearly invisible
  return new THREE.MeshBasicMaterial({
    color: 0x444422, transparent: true, opacity: 0.08,
    depthTest: false, depthWrite: false, side: THREE.DoubleSide
  });
}
function matNerveSelected() {
  // Bright vivid red — maximum contrast
  return new THREE.MeshBasicMaterial({
    color: 0xff1a1a, transparent: false,
    depthTest: false, depthWrite: false, side: THREE.DoubleSide
  });
}
function matNerveDescendant(depthRatio) {
  // Orange cascade, fading slightly at deeper levels
  return new THREE.MeshBasicMaterial({
    color: 0xff6600, transparent: true,
    opacity: 0.85 - depthRatio * 0.25,
    depthTest: false, depthWrite: false, side: THREE.DoubleSide
  });
}
function matOther() {
  return new THREE.MeshStandardMaterial({
    color: 0x6688aa, transparent: true, opacity: 0.05,
    roughness: 0.9, metalness: 0,
    depthWrite: false, side: THREE.DoubleSide
  });
}

// State
let meshMap      = {};   // GLB node name → Mesh
let selectedNerve = null;
let animTimers   = [];

// ═══════════════════════════════════════════════════════════════════
// GLB LOADING
// ═══════════════════════════════════════════════════════════════════
function setStatus(msg, color) {
  const el = document.getElementById('status-msg');
  if (el) { el.textContent = msg; el.style.color = color || '#888'; }
}

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const bar = document.getElementById('loading-bar');
  bar.style.display = 'block';
  setStatus('Loading ' + file.name + ' …');

  // Use createObjectURL — more reliable than parse() for local GLBs
  const objectURL = URL.createObjectURL(file);

  const dracoLoader = new THREE.DRACOLoader();
  dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
  dracoLoader.setDecoderConfig({ type: 'js' }); // use JS decoder (no WASM needed)

  const loader = new THREE.GLTFLoader();
  loader.setDRACOLoader(dracoLoader);
  loader.load(
    objectURL,
    function(gltf) {                          // ── success ──
      URL.revokeObjectURL(objectURL);
      bar.style.display = 'none';
      document.getElementById('drop-overlay').style.display = 'none';

      const model = gltf.scene;
      scene.add(model);

      // Fit camera to model bounds
      const box  = new THREE.Box3().setFromObject(model);
      const cnt  = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxD = Math.max(size.x, size.y, size.z);
      camera.position.set(cnt.x, cnt.y + size.y * 0.05, cnt.z + maxD * 1.3);
      camera.lookAt(cnt);
      controls.target.copy(cnt);
      controls.update();

      // Assign materials; build meshMap
      // Three.js often creates a named Group (anatomy name) containing
      // an unnamed Mesh child. We resolve the name by checking:
      //   1. obj.name (mesh's own name)
      //   2. obj.parent.name (parent group's name)
      //   3. obj.parent.parent.name (grandparent, for deeper nesting)
      let nerveCount = 0, totalMesh = 0;

      function resolvedName(obj) {
        if (obj.name) return obj.name;
        if (obj.parent && obj.parent.name) return obj.parent.name;
        if (obj.parent && obj.parent.parent && obj.parent.parent.name) return obj.parent.parent.name;
        return '';
      }

      model.traverse(obj => {
        if (!obj.isMesh) return;
        totalMesh++;
        const name = resolvedName(obj);
        if (name) meshMap[name] = obj;

        const isNerve = !!MESH_TO_NERVE[name];
        if (isNerve) nerveCount++;
        const mat = isNerve ? matNerveDefault() : matOther();
        if (Array.isArray(obj.material)) obj.material = obj.material.map(() => mat.clone());
        else obj.material = mat;
        obj.renderOrder = isNerve ? 2 : 1;
      });

      console.log(`Loaded: ${totalMesh} meshes, ${nerveCount} nerve meshes recognised`);
      if (nerveCount === 0) {
        const sample = Object.keys(meshMap).slice(0, 30).join('\n');
        console.warn('Still 0 nerve matches. Sample mesh names:\n' + sample);
      }
    },
    function(xhr) {                           // ── progress ──
      if (xhr.total) {
        const pct = Math.round(xhr.loaded / xhr.total * 100);
        setStatus('Loading … ' + pct + '%');
      }
    },
    function(err) {                           // ── error ──
      URL.revokeObjectURL(objectURL);
      bar.style.display = 'none';
      const msg = err && err.message ? err.message : String(err);
      console.error('GLTFLoader error:', err);
      setStatus('Error: ' + msg, '#ff5555');
    }
  );
});

// ═══════════════════════════════════════════════════════════════════
// SELECTION + PROPAGATION ANIMATION
// ═══════════════════════════════════════════════════════════════════
function setMesh(name, mat) {
  const m = meshMap[name];
  if (!m) return;
  if (Array.isArray(m.material)) m.material = m.material.map(() => mat);
  else m.material = mat;
}

function applyToNerveMesh(nerveName, mat) {
  const data = NERVE_GRAPH[nerveName];
  if (!data || !data.meshName) return;
  setMesh(toThreeName(data.meshName), mat);
}

function resetAllNerves(dimmed) {
  // dimmed=true → fade everything out before a selection is applied
  const mat = dimmed ? matNerveDimmed() : matNerveDefault();
  for (const name of Object.keys(NERVE_GRAPH)) {
    applyToNerveMesh(name, mat);
  }
}

function clearTimers() {
  animTimers.forEach(clearTimeout);
  animTimers = [];
}

function selectNerve(nerveName) {
  if (!NERVE_GRAPH[nerveName]) return;
  clearTimers();
  selectedNerve = nerveName;

  // Dim all nerves immediately so selection pops out
  resetAllNerves(true);

  // Update sidebar
  document.querySelectorAll('.nerve-item').forEach(el => el.classList.remove('selected','highlighted'));
  const selEl = document.getElementById(itemId(nerveName));
  if (selEl) { selEl.classList.add('selected'); selEl.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

  // Info panel
  const data = NERVE_GRAPH[nerveName];
  document.getElementById('nerve-name').textContent = nerveName;
  document.getElementById('nerve-root').textContent = data.spinalRoot;
  document.getElementById('nerve-territory').textContent = data.territory;
  document.getElementById('path-text').textContent = getPath(nerveName).join(' → ');
  document.getElementById('info-panel').style.display = 'block';
  document.getElementById('reset-btn').style.display = 'block';

  // Build level-order: [ [level0 names], [level1 names], ... ]
  const levels = [];
  let q = [{ name: nerveName, level: 0 }];
  const maxDepth = { val: 0 };
  const levelOf = {};
  while (q.length) {
    const { name, level } = q.shift();
    if (!NERVE_GRAPH[name]) continue;
    levelOf[name] = level;
    if (!levels[level]) levels[level] = [];
    levels[level].push(name);
    if (level > maxDepth.val) maxDepth.val = level;
    for (const c of NERVE_GRAPH[name].children) q.push({ name: c, level: level + 1 });
  }

  // Animate each level with staggered delay
  levels.forEach((names, lvl) => {
    const t = setTimeout(() => {
      for (const name of names) {
        // Sidebar highlight
        const el = document.getElementById(itemId(name));
        if (el && name !== nerveName) el.classList.add('highlighted');

        // Mesh highlight
        if (name === nerveName) {
          applyToNerveMesh(name, matNerveSelected());
        } else {
          const ratio = maxDepth.val > 0 ? (levelOf[name] - 1) / maxDepth.val : 0;
          applyToNerveMesh(name, matNerveDescendant(ratio));
        }
      }
    }, lvl * 160);
    animTimers.push(t);
  });
}

function resetSelection() {
  clearTimers();
  selectedNerve = null;
  resetAllNerves(false);
  document.querySelectorAll('.nerve-item').forEach(el => el.classList.remove('selected','highlighted'));
  document.getElementById('info-panel').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════════════
// CLICK RAYCASTING
// ═══════════════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
let mouseDownPos = null;

canvas.addEventListener('mousedown', e => {
  mouseDownPos = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mouseup', e => {
  if (!mouseDownPos) return;
  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  if (Math.sqrt(dx*dx + dy*dy) > 5) return; // was a drag, not a click

  const rect = canvas.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const nerveMeshes = Object.entries(meshMap)
    .filter(([name]) => !!MESH_TO_NERVE[name])
    .map(([, mesh]) => mesh);

  const hits = raycaster.intersectObjects(nerveMeshes, false);
  if (hits.length > 0) {
    const hitName = hits[0].object.name;
    const nName   = MESH_TO_NERVE[hitName];
    if (nName) selectNerve(nName);
  }
});

// ═══════════════════════════════════════════════════════════════════
// RENDER LOOP + RESIZE
// ═══════════════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = ctnr.clientWidth, h = ctnr.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// Init
buildSidebar();
</script>
</body>
</html>
